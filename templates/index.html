<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyGym Pro Core</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏋️ MyGym</h1>
        </header>

        <main>
            <section class="card">
                <h2 id="workout-section-title">🚀 ابدأ تمرينًا جديدًا</h2>

                <button id="main-workout-btn" class="btn-primary btn-large" onclick="handleMainButtonClick(this)" style="transition: all 0.3s ease;">
                    ابدأ تمرينًا
                </button>
				<button class="btn-secondary" onclick="window.location.href='/plans'" style="margin-top: 12px; width: 100%;">
					📋 خططي التدريبية
				</button>

                <button id="abandon-shortcut-btn" class="btn-secondary" onclick="abandonActiveSession(this)" style="display: none; margin-top: 12px; width: 100%; background-color: #ef4444; color: white;">
                    🗑️ حذف وإلغاء الجلسة المعلقة
                </button>
            </section>

            <section class="history-section">
                <h2>✓ آخر التمارين</h2>
                <div id="history-list">
                </div>
            </section>
        </main>
    </div>

    <!-- ====== MODAL لعرض تفاصيل الجلسة ====== -->
    <div id="history-modal" class="modal-overlay" style="display: none;" onclick="if(event.target===this) History.close()">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal-session-title">جلسة</h2>
                <button class="modal-close-btn" onclick="History.close()">✕</button>
            </header>
            <div id="modal-session-meta" class="modal-meta">
                <span id="modal-session-date"></span>
                <span id="modal-session-duration"></span>
                <span id="modal-session-volume"></span>
            </div>
            <div id="modal-exercises-list" class="modal-exercises">
                <!-- سيتم ملؤها بواسطة JS -->
            </div>
                <button class="btn-danger" style="margin-top: 12px;" onclick="History.deleteCurrentSession()">🗑️ حذف الجلسة</button>
            <button class="btn-secondary modal-close-btn-bottom" onclick="History.close()">إغلاق</button>
        </div>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <script src="/static/app.js"></script>
</body>
</html>
