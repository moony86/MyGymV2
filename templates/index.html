<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyGym Pro Core</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏋️ MyGym</h1>
        </header>

        <main>
            <section class="card">
                <h2 id="workout-section-title">🚀 ابدأ تمرينًا جديدًا</h2>

                <button id="main-workout-btn" class="btn-primary btn-large" onclick="handleMainButtonClick(this)" style="transition: all 0.3s ease;">
                    ابدأ تمرينًا
                </button>

                <button id="abandon-shortcut-btn" class="btn-secondary" onclick="abandonActiveSession(this)" style="display: none; margin-top: 12px; width: 100%; background-color: #ef4444; color: white;">
                    🗑️ حذف وإلغاء الجلسة المعلقة
                </button>
            </section>

            <section class="card">
                <h2>✓ آخر التمارين</h2>
                <div id="history-list">
                    <p class="text-muted">لا تمارين مسجلة بعد</p>
                </div>
            </section>
        </main>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <script src="/static/app.js"></script>
</body>
</html>
