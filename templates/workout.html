<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل تمرين - MyGym</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="btn-back" onclick="router.navigate('home')">← عودة</button>
            <h1 id="session-title">جلسة جديدة</h1>
            <span id="session-timer" class="timer">00:00</span>
        </header>

        <main>
            <!-- قسم اختيار التمرين وجدول الجلسات الديناميكي -->
            <section class="card">
                <div class="exercise-select">
                    <label>التمرين الحالي</label>
                    <select id="exercise-select" onchange="handleExerciseChange()">
                        <option value="">اختر تمرين للبدء...</option>
                    </select>
                </div>

                <!-- جدول الجلسات الديناميكي للتمرين المختار -->
                <div id="dynamic-sets-section" style="display: none; margin-top: 20px;">
                    <table class="sets-table" dir="rtl">
                        <thead>
                            <tr>
                                <th>الجلسة</th>
                                <th>الوزن (كجم)</th>
                                <th>العدات</th>
                                <th>إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="dynamic-sets-body">
                            <!-- الأسطر ستتولد هنا تلقائياً عبر الجافاسكربت -->
                        </tbody>
                    </table>

                    <div class="table-actions-row" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <button class="btn-secondary" onclick="addNewSetRow()">➕ إضافة جلسة جديدة</button>
                        <button class="btn-primary" id="lock-exercise-btn" style="background: #059669;" onclick="saveWholeExercise(this)">🔒 حفظ وقفل الجهاز</button>
                    </div>
                </div>
            </section>

            <!-- سجل المجموعات المحفوظة خلال اليوم التدريبي الكامل -->
            <section class="card">
                <h2>المجموعات المسجلة اليوم</h2>
                <div id="sets-list">
                    <p class="text-muted">لا توجد مجموعات محفوظة في هذه الجلسة بعد</p>
                </div>
                <div class="volume-bar">
                    <span>الحجم الكلي:</span>
                    <strong id="total-volume">0 كجم</strong>
                </div>
            </section>

            <!-- إنهاء الحصة بالكامل -->
            <section class="card" style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px; align-items: center;">
                <button class="btn-primary" style="background: #10b981; padding: 14px; font-weight: bold; font-size: 1.1rem;" onclick="finishWorkout(this)">🔚 إنهاء وحفظ التمرين</button>

                <button class="btn-danger" style="background: #dc2626; color: white; padding: 14px; font-size: 0.9rem; opacity: 0.9;" onclick="abandonActiveSession(this)">🗑️ حذف</button>
            </section>
        </main>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <script src="/static/app.js"></script>
</body>
</html>
